        window.txConsts = {
          isWebInterface: true,

            profilePicture: "",

            login: { url: "https://vibesm.cc", img: "https://placehold.co/192x64/222/fff?text=Login+Sponsor" }

          serverTimezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          fxsOutdated: false,

        };
